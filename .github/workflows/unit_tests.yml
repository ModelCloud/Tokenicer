name: Unit tests

defaults:
  run:
    shell: bash -le {0}

on:
  repository_dispatch:
  workflow_dispatch:

env:
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  UV_TORCH_BACKEND: cu130
  TORCH_VERSION: 2.11.0
  PYTHON_VERSION: 3.14t
  UV_PYTHON: 3.14t

jobs:

  list-test-files:
    runs-on: ubuntu-24.04
    if: github.event.inputs.m4-only != 'true'
    outputs:
      test-files: ${{ steps.files.outputs.test-files }}
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v4

      - name: List files
        id: files
        run: |
          dir="tests"
          json_array="["

          for file in "$dir"/*; do
          [ -f "$file" ] || continue
          filename=$(basename "$file")
          json_array+="\"$filename\","
          done

          json_array="${json_array%,}]"

          echo "$json_array"

          echo "test-files=$json_array" >> "$GITHUB_OUTPUT"

  test:
    runs-on: [ self-hosted ]
    needs:
      - list-test-files
    container:
      image: 10.0.13.31:5000/nvidia/cuda:130-ubuntu24.04_0325
      volumes:
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /monster/ci/models:/monster/data/model
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        - /monster/ci/uv:/opt/uv
    strategy:
      fail-fast: false
      matrix:
        test_script: ${{ fromJSON(needs.list-test-files.outputs.test-files) }}
    steps:
      - uses: actions/checkout@v4

      - name: Print Env
        run: |
          env_name="cu130_torch_py3.14_tokenicer_${{ matrix.test_script }}"

          echo "env name: $env_name"

          /opt/uv/setup_uv_venv.sh $env_name

      - name: install requirements
        run: |
          uv pip install parameterized pytest pytest-xdist jinja2 transformers sentencepiece tiktoken protobuf -U
          if [[ "${{ matrix.test_script }}" == "test_gemma3.py" || "${{ matrix.test_script }}" == "test_loop_models.py" || "${{ matrix.test_script }}" == "test_pad_token.py" ]]; then
            uv pip install torch
          fi

      - name: Install
        run: uv pip install .

      - name: test
        run: pytest -n 8 -v tests/${{ matrix.test_script }}

  prepare-setuptools:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parser.outputs.versions || '[]' }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Generate version matrix
        id: parser
        run: |
          versions=$(python .github/scripts/ci_loop_versions.py setuptools ">=77.0.1,<83")
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  check-setuptools:
    needs: prepare-setuptools
    if: needs.prepare.outputs.versions != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install package with selected setuptools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . "setuptools==${{ matrix.version }}"

      - name: Show versions
        run: |
          python --version
          python -m pip show setuptools
